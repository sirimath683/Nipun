<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIPUN | Official Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@500;700&display=swap');

        :root {
            --primary: #00d2ff;
            --accent: #25D366;
            --bg: #08080a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-secondary: #94a3b8;
        }

        /* Sexy Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(transparent, var(--primary), transparent);
            border-radius: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 80px 20px;
            line-height: 1.6;
        }

        /* Preloader */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 5px;
            color: var(--primary);
            animation: pulseText 1.5s infinite;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.5; text-shadow: 0 0 0px var(--primary); }
            50% { opacity: 1; text-shadow: 0 0 15px var(--primary); }
        }

        .progress-container { width: 250px; height: 3px; background: rgba(255, 255, 255, 0.05); margin-top: 20px; border-radius: 10px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--primary); box-shadow: 0 0 15px var(--primary); animation: load 2.5s forwards; }
        @keyframes load { 100% { width: 100%; } }

        .container {
            width: 100%;
            max-width: 540px;
            background: rgba(12, 12, 16, 0.6);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            padding: 50px 40px;
            border-radius: 40px;
            text-align: center;
            opacity: 0;
            transform: scale(0.9) translateY(40px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .container.loaded { opacity: 1; transform: scale(1) translateY(0); }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Profile Section */
        .profile-wrapper { position: relative; width: 140px; height: 140px; margin: 0 auto 30px; }
        .profile-img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1); position: relative; z-index: 2;
        }
        .profile-wrapper::after {
            content: ""; position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px;
            border-radius: 50%; background: conic-gradient(from 0deg, var(--primary), transparent, var(--primary));
            z-index: 1; animation: spin 3s linear infinite; filter: blur(10px); opacity: 0.5;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 28px; margin-bottom: 15px; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .personal-info { font-size: 14px; color: var(--text-secondary); margin-bottom: 40px; }

        .section-tag { font-size: 11px; font-weight: 800; letter-spacing: 4px; color: var(--primary); text-transform: uppercase; margin: 40px 0 25px; display: block; opacity: 0.8; }

        /* Buttons & Channels */
        .btn-list { display: flex; flex-direction: column; gap: 15px; }
        .btn {
            display: flex; align-items: center; justify-content: space-between;
            text-decoration: none; padding: 22px 28px; border-radius: 25px;
            background: var(--card-bg); border: 1px solid var(--border); transition: 0.4s;
        }
        .btn:hover { transform: translateX(10px) scale(1.02); background: rgba(255, 255, 255, 0.07); border-color: rgba(255, 255, 255, 0.2); }
        .channel-content { display: flex; align-items: center; gap: 20px; text-align: left; }
        .channel-content i { font-size: 28px; }
        .fa-whatsapp { color: var(--accent); }
        .name { display: block; font-weight: 600; font-size: 15px; color: #f8fafc; margin-bottom: 4px; }

        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } }

        /* Contact Form */
        .contact-box { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); padding: 30px; border-radius: 30px; margin-top: 50px; text-align: left; }
        .contact-box h3 { font-family: 'Orbitron', sans-serif; font-size: 16px; color: var(--primary); margin-bottom: 20px; text-align: center; letter-spacing: 2px; }
        .input-group { margin-bottom: 15px; }
        .input-group input, .input-group textarea {
            width: 100%; background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border);
            padding: 15px; border-radius: 15px; color: #fff; font-family: 'Inter', sans-serif; outline: none; transition: 0.3s;
        }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.08); }
        .send-btn {
            width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--primary);
            color: #000; font-weight: 800; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .send-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3); }

        .footer-logo { margin-top: 70px; font-family: 'Orbitron', sans-serif; font-size: 14px; letter-spacing: 8px; color: var(--primary); opacity: 0.3; }
    </style>
</head>

    <script>
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('main-content').classList.add('loaded');
                    revealOnScroll();
                }, 600);
            }, 2500);
        });

        function revealOnScroll() {
            const reveals = document.querySelectorAll('.reveal');
            for (let i = 0; i < reveals.length; i++) {
                const windowHeight = window.innerHeight;
                const revealTop = reveals[i].getBoundingClientRect().top;
                if (revealTop < windowHeight - 50) {
                    reveals[i].classList.add('active');
                }
            }
        }
        window.addEventListener('scroll', revealOnScroll);

        function sendToWhatsApp() {
            const name = document.getElementById('userName').value;
            const message = document.getElementById('userMessage').value;
            const myNumber = "94789204088";

            if (!name || !message) {
                alert("Please fill all fields!");
                return;
            }

            const finalMsg = `*New Question from Portfolio!*%0A%0A*Name:* ${name}%0A*Message:* ${message}`;
            window.open(`https://wa.me/${myNumber}?text=${finalMsg}`, '_blank');
        }
